name: Build Installers

on:
  push:
    branches:
      - test-windows-installer
    # Run Action only when /docker is pushed to
#    paths:
#      - 'docker/**'
  workflow_dispatch:

jobs:
  windows-installer:
    name: Windows
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Installer
      run: docker run -v $GITHUB_WORKSPACE/docker:/src/ danleyb2/pyinstaller-windows "pyinstaller platerec_installer.spec -F"
    - uses: actions/upload-artifact@v4
      with:
        name: Windows-Installer-unsigned
        path: docker/dist

  linux-installer:
    name: Linux
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Installer
      run: docker run -v $GITHUB_WORKSPACE/docker:/src/ cdrx/pyinstaller-linux "pyinstaller platerec_installer.spec -F"
    - uses: actions/upload-artifact@v4
      with:
        name: PlateRecognizer-Installer-Linux
        path: docker/dist/PlateRecognizer-Installer

  # sign-installer:
  #   name: Sign
  #   runs-on: windows-latest
  #   needs: windows-installer
  #   steps:
  #     - uses: actions/download-artifact@v2
  #       with:
  #         name: Windows-Installer-unsigned
  #         path: dist

  #     - uses: DanaBear/code-sign-action@98c79121b376beab8d6a9484f445089db4461bca
  #       with:
  #         certificate: '${{ secrets.CERTIFICATE }}'
  #         password: '${{ secrets.PASSWORD }}'
  #         certificatesha1: '${{ secrets.CERTIFICATE_SHA1 }}'
  #         timestampUrl: '${{ secrets.TIMESTAMP_URL }}'
  #         folder: dist
  #         recursive: true
  #     - uses: actions/upload-artifact@v2
  #       with:
  #         name: PlateRecognizer-Installer-Windows
  #         path: dist

  test-windows-installer:
    runs-on: windows-latest
    needs: windows-installer
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: Windows-Installer-unsigned
          path: dist
      - name: Run tests and capture log output
        id: test-executable
        run: |
          # Run your executable and capture the output. Time limit 10 seconds
          $output = timeout /t 10 /nobreak .\dist\Windows-Installer-unsigned.exe | Out-String
          Write-Output "TestOutput::$output"
      - name: Check log output for specific string
        run: |
          # Check if the log output contains a specific string
          $specificString = "YourSpecificString"
          if ($env:TestOutput -contains $specificString) {
            Write-Output "Test Passed: Log output contains '$specificString'"
          } else {
            Write-Error "Test Failed: Log output does not contain '$specificString'"
            exit 1
          }

  mac-installer:
    runs-on: macos-latest
    name: MacOS
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.7.12
    - name: Build Installer
      run: |
        cd docker
        pip install -r requirements.txt pyinstaller==4.9
        pyinstaller platerec_installer.spec -F
        chmod -R +x dist
    - uses: actions/upload-artifact@v4
      with:
        name: PlateRecognizer-Installer-MacOS
        path: docker/dist/*

